tags:
  - name: Review
    description: 식당 리뷰 작성, 수정, 삭제 및 조회 API

components:
  schemas:
    ReviewRequest:
      type: object
      required:
        - restaurantId
        - rating
        - comment
      properties:
        restaurantId:
          type: integer
          description: 리뷰를 남길 식당 ID
        rating:
          type: number
          format: float
          description: 별점 (1~5)
        comment:
          type: string
          description: 리뷰 내용
    ReviewImageRequest:
      type: object
      required:
        - restaurantId
        - rating
        - comment
      properties:
        restaurantId:
          type: integer
        rating:
          type: number
          format: float
        comment:
          type: string
        image:
          type: string
          format: binary
          description: 업로드할 리뷰 이미지 파일

paths:
  /api/v1/review:
    post:
      summary: 식당 리뷰 작성 (텍스트 전용)
      tags:
        - Review
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewRequest'
      responses:
        "201":
          description: 리뷰 등록 성공
        "400":
          description: 필수 데이터 누락 또는 잘못된 별점 범위
        "404":
          description: 존재하지 않는 식당

  /api/v1/review/with-image:
    post:
      summary: 사진을 포함한 리뷰 작성
      tags:
        - Review
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReviewImageRequest'
      responses:
        "201":
          description: 사진 리뷰 등록 성공
        "400":
          description: 필수 데이터 누락

  /api/v1/review/my/list:
    get:
      summary: 내가 작성한 모든 리뷰 목록 조회
      tags:
        - Review
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 내 리뷰 조회 성공

  /api/v1/review/summary/{restaurantId}:
    get:
      summary: 식당별 평균 별점 및 총 리뷰 개수 요약
      tags:
        - Review
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 요약 정보 조회 성공

  /api/v1/review/{restaurantId}:
    get:
      summary: 특정 식당의 전체 리뷰 목록 조회
      tags:
        - Review
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 식당 리뷰 목록 조회 성공

  /api/v1/review/{r_id}:
    patch:
      summary: 내가 작성한 리뷰 수정
      tags:
        - Review
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: r_id
          required: true
          schema:
            type: integer
          description: 수정할 리뷰의 고유 ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rating:
                  type: number
                comment:
                  type: string
      responses:
        "200":
          description: 리뷰 수정 성공
        "403":
          description: 수정 권한 없음
    delete:
      summary: 내가 작성한 리뷰 삭제
      tags:
        - Review
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: r_id
          required: true
          schema:
            type: integer
          description: 삭제할 리뷰의 고유 ID
      responses:
        "200":
          description: 리뷰 삭제 성공
        "403":
          description: 삭제 권한 없음
