tags:
  - name: Favorite
    description: 맛집 찜(즐겨찾기) 관리 API

components:
  schemas:
    FavoriteAddRequest:
      type: object
      required:
        - restaurantId
      properties:
        restaurantId:
          type: integer
          description: 찜할 식당의 고유 ID

paths:
  /api/v1/favorite:
    post:
      summary: 맛집 찜하기 추가
      tags:
        - Favorite
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FavoriteAddRequest'
      responses:
        "200":
          description: 찜 목록 추가 성공
        "400":
          description: 식당 ID 누락, 존재하지 않는 식당, 또는 이미 찜한 식당
        "401":
          description: 권한 없음 (토큰 누락/만료)
        "500":
          description: 서버 내부 오류

  /api/v1/favorite/list:
    get:
      summary: 내 찜 목록 페이징 조회
      tags:
        - Favorite
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: 페이지 번호
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: 한 페이지당 출력할 항목 수
      responses:
        "200":
          description: 찜 목록 조회 성공 (페이징 정보 포함)
        "401":
          description: 권한 없음 (토큰 누락/만료)
        "500":
          description: 서버 내부 오류

  /api/v1/favorite/ranking:
    get:
      summary: 전체 찜 랭킹 TOP 5 조회
      tags:
        - Favorite
      responses:
        "200":
          description: 랭킹 조회 성공
        "500":
          description: 서버 내부 오류

  /api/v1/favorite/status/{restaurantId}:
    get:
      summary: 특정 식당 찜 여부 확인
      tags:
        - Favorite
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: integer
          description: 상태를 확인할 식당의 ID
      responses:
        "200":
          description: 상태 확인 성공 (isFavorite 및 f_id 반환)
        "401":
          description: 권한 없음 (토큰 누락/만료)
        "500":
          description: 서버 내부 오류

  /api/v1/favorite/{f_id}:
    delete:
      summary: 찜 취소(삭제)하기
      tags:
        - Favorite
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: f_id
          required: true
          schema:
            type: integer
          description: 삭제할 찜 데이터의 고유 ID (f_id)
      responses:
        "200":
          description: 찜 취소 성공
        "401":
          description: 권한 없음 (토큰 누락/만료)
        "404":
          description: 삭제 권한이 없거나 존재하지 않는 찜 내역
        "500":
          description: 서버 내부 오류
