tags:
  - name: Auth
    description: 인증 및 사용자 프로필 관리 API

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: 사용자 아이디
        password:
          type: string
          description: 사용자 비밀번호
    ProfileUpdateRequest:
      type: object
      properties:
        username:
          type: string
          description: 변경할 닉네임
        profileImage:
          type: string
          format: binary
          description: 업로드할 프로필 이미지 파일 (multipart/form-data)

paths:
  /api/v1/auth/signup:
    post:
      summary: 회원가입
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        "200":
          description: 회원가입 성공
        "400":
          description: 잘못된 요청 (입력값 누락, 중복된 아이디 등)
        "500":
          description: 서버 내부 오류

  /api/v1/auth/login:
    post:
      summary: 로그인 및 토큰 발급
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        "200":
          description: 로그인 성공 및 JWT 반환
        "400":
          description: 필수 입력값 누락
        "401":
          description: 인증 실패
        "500":
          description: 서버 내부 오류

  /api/v1/auth/profile:
    get:
      summary: 내 정보 조회 (토큰 필요)
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 인증 성공 및 유저 정보 반환
        "401":
          description: 유효하지 않거나 만료된 토큰
    patch:
      summary: 내 프로필 수정 (닉네임, 프로필 사진)
      tags:
        - Auth
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        "200":
          description: 프로필 업데이트 성공
        "400":
          description: 수정할 정보 미입력
        "401":
          description: 권한 없음 (토큰 누락/만료)
        "500":
          description: 프로필 수정 실패
